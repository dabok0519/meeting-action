server {
    listen 80;

    # 배포용 React 빌드 결과물 경로 (EC2 배포 시 실제 서버 경로 재확인 필요)
    root /home/ubuntu/meeting-action/frontend/dist;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:8000;  # 경로 없이 그대로 전달 (백엔드가 /api 프리픽스로 라우트를 등록했으므로 벗기면 안 됨)
        proxy_read_timeout 150s;  # OpenRouter 재시도 최악치(~120초) 감안
    }

    location / {
        try_files $uri /index.html;  # React Router SPA 새로고침 대응
    }                                # 즉 , 새로고침을 하면 Nginx는  ex)/meetings라는 진짜 파일 경로를 모르기 때문에 에러를 내지만 try_files 덕분에
                                     # index.html(React Router 포함)을 통해 브라우저에서 리액트 라우터(React Router)가 실행되어  
                                     # 주소창의 /meetings를 보고 필요한 화면 컴포넌트만 쏙 올려서 주소를 복원 
}
